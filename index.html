<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>电子宠物领养乐园</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/modals.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon">🐾</div>
      <div class="logo-text">电子宠物领养乐园</div>
    </div>
    <div class="stats-row">
      <div class="stat-badge"><span class="icon">🎓</span><span>高等级:</span><span class="val" id="highLevelCount">0</span></div>
      <div class="stat-badge"><span class="icon">🍖</span><span>今日:</span><span class="val" id="todayFeedCount">0</span></div>
      <div class="stat-badge"><span class="icon">⭐</span><span>总计:</span><span class="val" id="totalFeedCount">0</span></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost btn-icon" onclick="PetApp.Modals.showSettings()" title="设置">⚙️</button>
      <button class="btn btn-ghost btn-icon" onclick="PetApp.Modals.confirmReset()" title="重置">🔄</button>
    </div>
  </div>

  <div class="main-content">
    <div class="pet-grid-wrap">
      <div class="pet-grid" id="petGrid"></div>
    </div>

    <div class="sidebar">
      <div class="panel feed-panel">
        <div class="panel-title"><span class="icon">🍖</span>投喂操作</div>
        <div class="selected-info" id="selectedInfo">点击宠物卡片选择投喂对象</div>
        <div class="quick-feed-grid" id="quickFeedGrid"></div>
        <div class="feed-actions">
          <div class="feed-btn-row">
            <button class="btn btn-primary btn-lg" onclick="PetApp.Render.feedSelected(1)" style="flex:1">🍖 ×1</button>
            <button class="btn btn-primary btn-lg" onclick="PetApp.Render.feedSelected(3)" style="flex:1">🍖 ×3</button>
          </div>
          <div class="feed-btn-row">
            <button class="btn btn-accent btn-lg" onclick="PetApp.Render.feedSelected(5)" style="flex:1">⭐ ×5</button>
            <button class="btn btn-secondary btn-lg" onclick="PetApp.Render.feedSelected(10)" style="flex:1">🎁 ×10</button>
          </div>
          <div class="batch-actions">
            <button class="btn btn-ghost btn-sm" onclick="PetApp.Render.selectAll()">✅ 全选</button>
            <button class="btn btn-ghost btn-sm" onclick="PetApp.Render.clearSelection()">❌ 取消</button>
          </div>
        </div>
      </div>

      <div class="panel detail-panel" id="detailPanel" style="display:none">
        <div class="panel-title"><span class="icon">📋</span>宠物详情</div>
        <div class="pet-detail" id="petDetail"></div>
      </div>

      <div class="panel stats-panel">
        <div class="panel-title"><span class="icon">📊</span>班级数据</div>
        <div class="tab-bar">
          <button class="tab-btn active" onclick="PetApp.Render.switchStatsTab('overview',this)">概览</button>
          <button class="tab-btn" onclick="PetApp.Render.switchStatsTab('level',this)">等级</button>
          <button class="tab-btn" onclick="PetApp.Render.switchStatsTab('type',this)">类型</button>
        </div>
        <div class="tab-content active" id="tab-overview">
          <div class="stats-grid" id="statsGrid"></div>
        </div>
        <div class="tab-content" id="tab-level">
          <div class="chart-wrap"><canvas id="levelChart"></canvas></div>
        </div>
        <div class="tab-content" id="tab-type">
          <div class="chart-wrap"><canvas id="typeChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal settings-modal">
    <div class="modal-title">⚙️ 系统设置</div>
    <div class="modal-body">
      <div class="setting-row">
        <span class="setting-label">每次投喂经验值</span>
        <input type="number" class="setting-input" id="feedExp" value="1" min="1" max="10">
      </div>
      <div class="setting-row">
        <span class="setting-label">升级动画时长(秒)</span>
        <input type="number" class="setting-input" id="animDuration" value="2" min="1" max="5">
      </div>
      <div class="setting-row">
        <span class="setting-label">导出/导入数据</span>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-ghost" onclick="PetApp.Modals.exportData()">📤 导出</button>
          <button class="btn btn-sm btn-ghost" onclick="PetApp.Modals.importData()">📥 导入</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="PetApp.Modals.closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="PetApp.Modals.saveSettings()">确定</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <div class="modal-title">✏️ 修改名称</div>
    <div class="modal-body">
      <input type="text" class="modal-input" id="nameInput" maxlength="10" placeholder="请输入新名称">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="PetApp.Modals.closeNameModal()">取消</button>
      <button class="btn btn-primary" onclick="PetApp.Modals.confirmNameChange()">确定</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="petTypeModal">
  <div class="modal">
    <div class="modal-title">🔄 选择宠物类型</div>
    <div class="modal-body">
      <div class="pet-type-selector" id="petTypeSelector"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="PetApp.Modals.closePetTypeModal()">取消</button>
      <button class="btn btn-primary" onclick="PetApp.Modals.confirmPetTypeChange()">确定</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal confirm-modal">
    <div class="modal-title" id="confirmTitle">⚠️ 确认操作</div>
    <div class="modal-body">
      <div class="confirm-msg" id="confirmMsg"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="PetApp.Modals.closeConfirmModal()">取消</button>
      <button class="btn btn-danger" id="confirmBtn">确定</button>
    </div>
  </div>
</div>

<div class="level-up-overlay" id="levelUpOverlay">
  <div class="level-up-card" id="levelUpCard"></div>
</div>

<div class="particles" id="particles"></div>

<input type="file" id="importFileInput" accept=".json" style="display:none">

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/logic.js"></script>
<script src="js/charts.js"></script>
<script src="js/animations.js"></script>
<script src="js/render.js"></script>
<script src="js/modals.js"></script>
<script src="js/app.js"></script>
</body>
</html>
